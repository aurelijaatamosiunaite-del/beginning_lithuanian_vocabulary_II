                { sentence: "Šis megztinis yra iš _____. Jis labai šiltas.", correct: "vilnos", options: ["vilnos", "medvilnės", "šilko", "lino"] },
                { sentence: "Svetainėje stovi sofa, fotelis ir mažas _____.", correct: "staliukas", options: ["staliukas", "šaldytuvas", "dušas", "gėlė"] },
                { sentence: "Ji mėgsta _____ papuošalus – žiedus, apyrankes ir auskarus.", correct: "nešioti", options: ["nešioti", "megzti", "prekiauti", "taupyti"] },
                { sentence: "Kiek _____ šio buto nuoma per mėnesį?", correct: "kainuoja", options: ["kainuoja", "sugenda", "tinka", "kabo"] },
                { sentence: "Miegamajame yra lova, spinta ir du _____.", correct: "paveikslai", options: ["paveikslai", "batai", "sijonai", "peiliai"] },
                { sentence: "Miegamajame ant grindų guli didelis _____.", correct: "kilimas", options: ["kilimas", "lova", "puodelis", "rankšluostis"] },
                { sentence: "Šie marškiniai yra _____. Reikia nusipirkti naujus.", correct: "suplyšę", options: ["suplyšę", "sugedę", "patogūs", "minkšti"] },
                { sentence: "Mes _____ į naują butą kitą savaitę.", correct: "persikelsime", options: ["persikelsime", "pasipuošime", "prekiausime", "taupysime"] }
            ],
            unit8: [
                { sentence: "Man labai skauda _____. Negaliu nieko valgyti.", correct: "gerklę", options: ["gerklę", "koją", "ranką", "nugarą"] },
                { sentence: "Aš labai _____: karščiuoju, kosčiu ir sloguoju.", correct: "sergu", options: ["sergu", "juokiuosi", "džiaugiuosi", "ilsiuosi"] },
                { sentence: "Lauke labai šalta ir _____. Reikia šiltai apsirengti.", correct: "vėjuota", options: ["vėjuota", "saulėta", "giedra", "karšta"] },
                { sentence: "Eik pas _____! Jis išrašys receptą vaistams.", correct: "gydytoją", options: ["gydytoją", "vaistininką", "mokytoją", "draugą"] },
                { sentence: "Šiandien dangus _____ – nėra nė vienos debesies.", correct: "giedras", options: ["giedras", "debesuotas", "lietingas", "drėgnas"] },
                { sentence: "Kai peršalu, visada geriu karštą arbatą su _____.", correct: "medumi", options: ["medumi", "sniegu", "ledu", "morkomis"] },
                { sentence: "Vakar visą dieną _____ sniegas. Dabar visur balta balta.", correct: "snigo", options: ["snigo", "lijo", "švietė", "pūtė"] },
                { sentence: "Vaistinėje ji nusipirko _____ nuo galvos skausmo. Gydytojas parašė receptą.", correct: "vaistų", options: ["medaus", "lupenų", "sodos", "vaistų"] },
                { sentence: "Ryte aš visada _____ šaltu vandeniu.", correct: "prausiuosi", options: ["prausiuosi", "rengiuosi", "ilsiuosi", "stebiu"] },
                { sentence: "Žiemą dienos trumpos, o _____ ilgos.", correct: "naktys", options: ["naktys", "saulės", "žvaigždės", "vėjai"] },
                { sentence: "Rytą _____ tirštas rūkas. Nieko nesimatė.", correct: "tvyrojo", options: ["tvyrojo", "snigo", "lijo", "švietė"] },
                { sentence: "Jis _____ koją ir dabar negali vaikščioti.", correct: "susilaužė", options: ["susilaužė", "sušlapo", "sušalo", "pasveiko"] },
                { sentence: "Po ligos ji pagaliau _____. Jau gali eiti į darbą.", correct: "pasveiko", options: ["pasveiko", "susirgo", "sušlapo", "sušalo"] },
                { sentence: "Danguje šviečia _____ ir daug žvaigždžių. Vakaras labai gražus.", correct: "mėnulis", options: ["mėnulis", "debesis", "rūkas", "sniegas"] },
                { sentence: "Jaučiuosi labai _____, noriu kuo greičiau eiti į lovą.", correct: "pavargęs", options: ["pavargęs", "pasveikęs", "nustebęs", "susišukavęs"] }
            ]
        };

        // ==================== MAIN APP ====================
        function App() {
            const [currentUnit, setCurrentUnit] = useState('unit5');
            const [direction, setDirection] = useState('en-lt');
            const [mode, setMode] = useState('menu');
            const [lastMode, setLastMode] = useState('');
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [userAnswer, setUserAnswer] = useState('');
            const [feedback, setFeedback] = useState('');
            const [score, setScore] = useState({ correct: 0, total: 0 });
            const [shuffledVocab, setShuffledVocab] = useState([]);
            const [multipleChoiceOptions, setMultipleChoiceOptions] = useState([]);
            const [shuffledSentences, setShuffledSentences] = useState([]);
            const [sentenceOptions, setSentenceOptions] = useState([]);
            const [selectedOption, setSelectedOption] = useState(null);
            // NEW: Difficult words recycling
            const [incorrectWords, setIncorrectWords] = useState([]);
            const [isReviewRound, setIsReviewRound] = useState(false);
            const [reviewIncorrectWords, setReviewIncorrectWords] = useState([]);

            const currentVocab = vocabularyData[currentUnit];
            const currentSentences = sentenceData[currentUnit];



            useEffect(() => {
                if (mode === 'completed' || mode === 'reviewOffer') return;
                const shuffled = [...currentVocab].sort(() => Math.random() - 0.5);
                setShuffledVocab(shuffled);
                setCurrentIndex(0);
                setScore({ correct: 0, total: 0 });
                setIncorrectWords([]);
                setIsReviewRound(false);
                setReviewIncorrectWords([]);
                if (currentSentences && currentSentences.length > 0) {
                    const shuffledSents = [...currentSentences].sort(() => Math.random() - 0.5);
                    setShuffledSentences(shuffledSents);
                }
            }, [currentUnit, mode, direction]);

            useEffect(() => {
                if (mode === 'multipleChoice' && shuffledVocab.length > 0) {
                    generateMultipleChoiceOptions();
                }
                if (mode === 'sentenceCompletion' && shuffledSentences.length > 0 && shuffledSentences[currentIndex]) {
                    generateSentenceOptions();
                }
            }, [currentIndex, shuffledVocab, shuffledSentences, mode]);

            const generateMultipleChoiceOptions = () => {
                const currentWord = shuffledVocab[currentIndex];
                if (!currentWord) return;
                const otherWords = shuffledVocab.filter((_, idx) => idx !== currentIndex);
                const randomOptions = otherWords.sort(() => Math.random() - 0.5).slice(0, 3);
                const allOptions = [currentWord, ...randomOptions].sort(() => Math.random() - 0.5);
                setMultipleChoiceOptions(allOptions);
            };

            const generateSentenceOptions = () => {
                const currentSentence = shuffledSentences[currentIndex];
                if (currentSentence && currentSentence.options) {
                    const shuffledOpts = [...currentSentence.options].sort(() => Math.random() - 0.5);
                    setSentenceOptions(shuffledOpts);
                }
            };

            const trackIncorrect = (word) => {
                if (isReviewRound) {
                    setReviewIncorrectWords(prev => [...prev, word]);
                } else {
                    setIncorrectWords(prev => [...prev, word]);
                }
            };

            const handleNext = () => {
                const maxIndex = mode === 'sentenceCompletion'
                    ? shuffledSentences.length - 1
                    : shuffledVocab.length - 1;

                if (currentIndex < maxIndex) {
                    setCurrentIndex(currentIndex + 1);
                    setIsFlipped(false);
                    setUserAnswer('');
                    setFeedback('');
                    setSelectedOption(null);
                } else {
                    setLastMode(mode);
                    // Check if we should offer review (only for vocab modes, not sentence completion)
                    const wordsToReview = isReviewRound ? reviewIncorrectWords : incorrectWords;
                    if (mode !== 'sentenceCompletion' && mode !== 'flashcards' && wordsToReview.length > 0) {
                        setMode('reviewOffer');
                    } else {
                        setMode('completed');
                    }
                }
            };

            const startReviewRound = () => {
                const wordsToReview = isReviewRound ? reviewIncorrectWords : incorrectWords;
                const uniqueWords = [...new Map(wordsToReview.map(w => [w.lithuanian, w])).values()];
                const shuffled = uniqueWords.sort(() => Math.random() - 0.5);
                setShuffledVocab(shuffled);
                setCurrentIndex(0);
                setScore({ correct: 0, total: 0 });
                setReviewIncorrectWords([]);
                setIsReviewRound(true);
                setFeedback('');
                setSelectedOption(null);
                setUserAnswer('');
                setMode(lastMode);
            };

            const handleFlip = () => setIsFlipped(!isFlipped);

            const checkAnswer = () => {
                const currentWord = shuffledVocab[currentIndex];
                const correctAnswer = direction === 'en-lt' ? currentWord.lithuanian : currentWord.english;
                const normalizedAnswer = userAnswer.toLowerCase().trim();
                const normalizedCorrect = correctAnswer.toLowerCase().trim();

                if (normalizedAnswer === normalizedCorrect) {
                    setFeedback('correct');
                    setScore(s => ({ correct: s.correct + 1, total: s.total + 1 }));
                } else {
                    setFeedback('incorrect');
                    setScore(s => ({ ...s, total: s.total + 1 }));
                    trackIncorrect(currentWord);
                }
                setTimeout(() => handleNext(), 1500);
            };

            const handleMultipleChoice = (selectedWord) => {
                const currentWord = shuffledVocab[currentIndex];
                const isCorrect = direction === 'en-lt'
                    ? selectedWord.lithuanian === currentWord.lithuanian
                    : selectedWord.english === currentWord.english;

                if (isCorrect) {
                    setFeedback('correct');
                    setScore(s => ({ correct: s.correct + 1, total: s.total + 1 }));
                } else {
                    setFeedback('incorrect');
                    setScore(s => ({ ...s, total: s.total + 1 }));
                    trackIncorrect(currentWord);
                }
                setTimeout(() => handleNext(), 1500);
            };

            const handleSentenceAnswer = (option) => {
                if (feedback !== '') return;
                const currentSentence = shuffledSentences[currentIndex];
                setSelectedOption(option);
                if (option === currentSentence.correct) {
                    setFeedback('correct');
                    setScore(s => ({ correct: s.correct + 1, total: s.total + 1 }));
                } else {
                    setFeedback('incorrect');
                    setScore(s => ({ ...s, total: s.total + 1 }));
                }
                setTimeout(() => handleNext(), 1500);
            };

            const resetToMenu = () => {
                setMode('menu');
                setScore({ correct: 0, total: 0 });
                setCurrentIndex(0);
                setFeedback('');
                setIncorrectWords([]);
                setReviewIncorrectWords([]);
                setIsReviewRound(false);
            };

            // ==================== SCREENS ====================
            const colors = { unit5: '#2e7d32', unit6: '#1565c0', unit7: '#e65100', unit8: '#c62828' };
            const bgColors = { unit5: '#e8f5e9', unit6: '#e3f2fd', unit7: '#fff3e0', unit8: '#fce4ec' };
            const dotColors = ['#7ab5d4', '#7ab5a0', '#d4a574', '#c48a9a'];

            const PageWrapper = ({ children }) => (
                <div className="min-h-screen p-4 sm:p-6">
                    <div className="max-w-2xl mx-auto">{children}</div>
                </div>
            );

            const BackButton = () => (
                <button onClick={resetToMenu} className="px-4 py-2 bg-white rounded-full shadow-sm text-gray-500 text-sm font-medium hover:shadow transition-shadow">
                    ← Meniu
                </button>
            );

            const ProgressBar = ({ current, total, label }) => (
                <div className="text-gray-500 font-medium text-sm">
                    {label} {current + 1} / {total}
                    {isReviewRound && <span className="review-badge ml-2 text-amber-600 font-semibold">⟳ Kartojimas</span>}
                </div>
            );

            const ScoreDisplay = () => (
                <div className="bg-white rounded-xl shadow-sm p-4 text-center">
                    <div className="text-sm text-gray-400">Rezultatas</div>
                    <div className="text-2xl font-bold text-gray-700">{score.correct} / {score.total}</div>
                </div>
            );

            const FeedbackDisplay = ({ correctAnswer }) => feedback ? (
                <div className={`mt-5 p-4 rounded-xl text-center font-semibold fade-in ${feedback === 'correct' ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-700 border border-red-200'}`}>
                    {feedback === 'correct' ? '✓ Teisingai!' : `✗ Neteisingai. Teisingas atsakymas: ${correctAnswer}`}
                </div>
            ) : null;

            // ==================== MENU ====================
            const MenuScreen = () => (
                <PageWrapper>
                    <div className="text-center mb-6 pt-4">
                        <div className="inline-block bg-white rounded-full w-14 h-14 leading-[56px] text-xl font-bold text-blue-600 mb-3 shadow-sm" style={{color:'#4a6fa5'}}>LT</div>
                        <h1 className="text-2xl sm:text-3xl font-bold text-gray-800 tracking-tight">Žodyno pratybos</h1>
                        <p className="text-gray-400 mt-1">5–8 pamokos</p>
                    </div>

                    {/* Direction toggle */}
                    <div className="mb-5">
                        <p className="text-sm text-gray-500 font-medium mb-2 text-center">Pasirinkite kryptį / Choose direction</p>
                        <div className="flex gap-1 bg-white rounded-full p-1 shadow-sm max-w-sm mx-auto">
                            <button onClick={() => setDirection('en-lt')}
                                className={`toggle-pill flex-1 rounded-full py-2.5 text-sm font-medium text-center ${direction === 'en-lt' ? 'bg-blue-500 text-white shadow-sm' : 'text-gray-400'}`}
                                style={direction === 'en-lt' ? {background:'#4a6fa5'} : {}}>
                                EN → LT
                            </button>
                            <button onClick={() => setDirection('lt-en')}
                                className={`toggle-pill flex-1 rounded-full py-2.5 text-sm font-medium text-center ${direction === 'lt-en' ? 'bg-blue-500 text-white shadow-sm' : 'text-gray-400'}`}
                                style={direction === 'lt-en' ? {background:'#4a6fa5'} : {}}>
                                LT → EN
                            </button>
                        </div>
                    </div>

                    {/* Unit selection */}
                    <div className="mb-5">
                        <p className="text-sm text-gray-500 font-medium mb-2">Pasirinkite pamoką</p>
                        <div className="grid grid-cols-2 gap-2">
                            {Object.keys(vocabularyData).map((unitKey) => {
                                const info = unitInfo[unitKey];
                                const num = unitKey.replace('unit','');
                                const isActive = currentUnit === unitKey;
                                return (
                                    <button key={unitKey} onClick={() => setCurrentUnit(unitKey)}
                                        className={`bg-white rounded-xl p-3.5 text-left transition-all shadow-sm ${isActive ? 'ring-2' : 'hover:shadow-md'}`}
                                        style={isActive ? {ringColor: colors[unitKey], boxShadow: `0 0 0 2px ${colors[unitKey]}`} : {}}>
                                        <div className="inline-block text-xs font-semibold px-2 py-0.5 rounded-lg mb-1.5"
                                            style={{background: bgColors[unitKey], color: colors[unitKey]}}>{num}</div>
                                        <div className="text-sm font-medium text-gray-800">{info.title}</div>
                                        <div className="text-xs text-gray-400 mt-1">{vocabularyData[unitKey].length} žodžiai</div>
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {/* Mode selection */}
                    <div>
                        <p className="text-sm text-gray-500 font-medium mb-2">Pasirinkite pratybų tipą</p>
                        <div className="flex flex-col gap-2">
                            {[
                                { m: 'flashcards', label: 'Kortelės', dot: dotColors[0] },
                                { m: 'multipleChoice', label: 'Pasirinkite teisingą atsakymą', dot: dotColors[1] },
                                { m: 'typing', label: 'Įrašykite atsakymą', dot: dotColors[2] },
                                { m: 'sentenceCompletion', label: 'Užbaikite sakinius', dot: dotColors[3] }
                            ].map((item) => (
                                <button key={item.m} onClick={() => setMode(item.m)}
                                    className="flex items-center gap-3 bg-white rounded-xl p-3.5 shadow-sm text-left transition-all hover:shadow-md text-gray-600">
                                    <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{background: item.dot}}></div>
                                    <span className="text-sm font-medium">{item.label}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </PageWrapper>
            );

            // ==================== FLASHCARDS ====================
            const FlashcardsMode = () => {
                const currentWord = shuffledVocab[currentIndex];
                if (!currentWord) return null;
                const frontText = direction === 'en-lt' ? currentWord.english : currentWord.lithuanian;
                const backText = direction === 'en-lt' ? currentWord.lithuanian : currentWord.english;
                const frontLabel = direction === 'en-lt' ? 'Angliškai' : 'Lietuviškai';
                const backLabel = direction === 'en-lt' ? 'Lietuviškai' : 'Angliškai';

                return (
                    <PageWrapper>
                        <div className="flex justify-between items-center mb-6">
                            <BackButton />
                            <ProgressBar current={currentIndex} total={shuffledVocab.length} label="Kortelė" />
                        </div>
                        <div className="bg-white rounded-2xl shadow-sm p-8 mb-5 min-h-[260px] flex items-center justify-center cursor-pointer" onClick={handleFlip}>
                            <div className="text-center">
                                <div className="text-xs text-gray-400 mb-2 uppercase tracking-wider">{isFlipped ? backLabel : frontLabel}</div>
                                <div className="text-2xl sm:text-3xl font-bold text-gray-800">{isFlipped ? backText : frontText}</div>
                                <div className="text-xs text-gray-300 mt-6">Spauskite, kad apverstumėte</div>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={handleFlip} className="flex-1 py-3 bg-white rounded-xl shadow-sm text-gray-600 font-medium text-sm hover:shadow transition-shadow">Apversti</button>
                            <button onClick={handleNext} className="flex-1 py-3 rounded-xl shadow-sm text-white font-medium text-sm hover:shadow transition-shadow" style={{background:'#4a6fa5'}}>Kita →</button>
                        </div>
                    </PageWrapper>
                );
            };

            // ==================== MULTIPLE CHOICE ====================
            const MultipleChoiceMode = () => {
                const currentWord = shuffledVocab[currentIndex];
                if (!currentWord || multipleChoiceOptions.length === 0) return null;
                const promptText = direction === 'en-lt' ? currentWord.english : currentWord.lithuanian;
                const promptLabel = direction === 'en-lt' ? 'Išverskite į lietuvių kalbą' : 'Translate to English';
                const correctAnswer = direction === 'en-lt' ? currentWord.lithuanian : currentWord.english;

                return (
                    <PageWrapper>
                        <div className="flex justify-between items-center mb-6">
                            <BackButton />
                            <ProgressBar current={currentIndex} total={shuffledVocab.length} label="Klausimas" />
                        </div>
                        <div className="bg-white rounded-2xl shadow-sm p-8 mb-5">
                            <div className="text-center mb-6">
                                <div className="text-xs text-gray-400 mb-2 uppercase tracking-wider">{promptLabel}</div>
                                <div className="text-2xl sm:text-3xl font-bold text-gray-800">{promptText}</div>
                            </div>
                            <div className="space-y-2">
                                {multipleChoiceOptions.map((option, idx) => {
                                    const optionText = direction === 'en-lt' ? option.lithuanian : option.english;
                                    const isCorrectOption = direction === 'en-lt' ? option.lithuanian === currentWord.lithuanian : option.english === currentWord.english;
                                    return (
                                        <button key={idx} onClick={() => handleMultipleChoice(option)} disabled={feedback !== ''}
                                            className={`w-full p-3.5 rounded-xl text-left text-sm font-medium transition-all ${
                                                feedback === '' ? 'bg-gray-50 hover:bg-blue-50 text-gray-700 border border-gray-100' 
                                                : isCorrectOption ? 'bg-green-50 text-green-700 border border-green-200' 
                                                : 'bg-gray-50 text-gray-300 border border-gray-100'}`}>
                                            {optionText}
                                        </button>
                                    );
                                })}
                            </div>
                            <FeedbackDisplay correctAnswer={correctAnswer} />
                        </div>
                        <ScoreDisplay />
                    </PageWrapper>
                );
            };

            // ==================== TYPING ====================
            const TypingMode = () => {
                const currentWord = shuffledVocab[currentIndex];
                if (!currentWord) return null;
                const promptText = direction === 'en-lt' ? currentWord.english : currentWord.lithuanian;
                const promptLabel = direction === 'en-lt' ? 'Įrašykite lietuviškai' : 'Type in English';
                const correctAnswer = direction === 'en-lt' ? currentWord.lithuanian : currentWord.english;

                return (
                    <PageWrapper>
                        <div className="flex justify-between items-center mb-6">
                            <BackButton />
                            <ProgressBar current={currentIndex} total={shuffledVocab.length} label="Klausimas" />
                        </div>
                        <div className="bg-white rounded-2xl shadow-sm p-8 mb-5">
                            <div className="text-center mb-6">
                                <div className="text-xs text-gray-400 mb-2 uppercase tracking-wider">{promptLabel}</div>
                                <div className="text-2xl sm:text-3xl font-bold text-gray-800 mb-6">{promptText}</div>
                                <input type="text" value={userAnswer} onChange={(e) => setUserAnswer(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && userAnswer && checkAnswer()}
                                    placeholder="Įrašykite atsakymą..." disabled={feedback !== ''}
                                    className="w-full p-4 text-lg border border-gray-200 rounded-xl focus:border-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-100" autoFocus />
                            </div>
                            <button onClick={checkAnswer} disabled={!userAnswer || feedback !== ''}
                                className="w-full py-3 rounded-xl text-white font-medium text-sm disabled:opacity-40 disabled:cursor-not-allowed transition-all" style={{background:'#4a6fa5'}}>
                                Tikrinti atsakymą
                            </button>
                            <FeedbackDisplay correctAnswer={correctAnswer} />
                        </div>
                        <ScoreDisplay />
                    </PageWrapper>
                );
            };

            // ==================== SENTENCE COMPLETION ====================
            const SentenceCompletionMode = () => {
                if (shuffledSentences.length === 0 || sentenceOptions.length === 0) {
                    return <div className="min-h-screen flex items-center justify-center"><div className="text-lg text-gray-400">Kraunama...</div></div>;
                }
                const currentSentence = shuffledSentences[currentIndex];
                if (!currentSentence) return <div className="min-h-screen flex items-center justify-center"><div className="text-lg text-gray-400">Kraunama...</div></div>;
                const correctAnswer = currentSentence.correct;

                return (
                    <PageWrapper>
                        <div className="flex justify-between items-center mb-6">
                            <BackButton />
                            <ProgressBar current={currentIndex} total={shuffledSentences.length} label="Sakinys" />
                        </div>
                        <div className="bg-white rounded-2xl shadow-sm p-8 mb-5">
                            <div className="text-center mb-6">
                                <div className="text-xs text-gray-400 mb-3 uppercase tracking-wider">Užbaikite sakinį</div>
                                <div className="text-xl sm:text-2xl font-bold text-gray-800">{currentSentence.sentence}</div>
                            </div>
                            <div className="space-y-2">
                                {sentenceOptions.map((option, idx) => {
                                    const isSelected = selectedOption === option;
                                    const isCorrect = option === correctAnswer;
                                    let cls = 'w-full p-3.5 rounded-xl text-left text-sm font-medium transition-all ';
                                    if (feedback === '') cls += 'bg-gray-50 hover:bg-amber-50 text-gray-700 border border-gray-100';
                                    else if (isSelected && feedback === 'correct') cls += 'bg-green-50 text-green-700 border border-green-200';
                                    else if (isSelected && feedback === 'incorrect') cls += 'bg-red-50 text-red-700 border border-red-200';
                                    else if (!isSelected && isCorrect && feedback === 'incorrect') cls += 'bg-green-50 text-green-700 border border-green-200';
                                    else cls += 'bg-gray-50 text-gray-300 border border-gray-100';
                                    return (
                                        <button key={idx} onClick={() => handleSentenceAnswer(option)} disabled={feedback !== ''} className={cls}>
                                            {option}
                                        </button>
                                    );
                                })}
                            </div>
                            <FeedbackDisplay correctAnswer={correctAnswer} />
                        </div>
                        <ScoreDisplay />
                    </PageWrapper>
                );
            };

            // ==================== REVIEW OFFER ====================
            const ReviewOfferScreen = () => {
                const wordsToReview = isReviewRound ? reviewIncorrectWords : incorrectWords;
                const uniqueWords = [...new Map(wordsToReview.map(w => [w.lithuanian, w])).values()];
                const percentage = score.total > 0 ? Math.round((score.correct / score.total) * 100) : 0;

                return (
                    <PageWrapper>
                        <div className="fade-in mt-8">
                            <div className="bg-white rounded-2xl shadow-sm p-8 text-center">
                                <div className="text-5xl mb-4">🔄</div>
                                <h2 className="text-2xl font-bold text-gray-800 mb-2">{isReviewRound ? 'Dar kartą?' : 'Beveik!'}</h2>
                                <p className="text-gray-500 mb-1">Rezultatas: {score.correct} / {score.total} ({percentage}%)</p>
                                <p className="text-gray-500 mb-5">
                                    {uniqueWords.length} {uniqueWords.length === 1 ? 'žodis' : uniqueWords.length < 10 ? 'žodžiai' : 'žodžių'} reikia pakartoti:
                                </p>
                                <div className="bg-amber-50 border border-amber-100 rounded-xl p-4 mb-6 text-left max-h-48 overflow-y-auto">
                                    {uniqueWords.map((w, i) => (
                                        <div key={i} className="flex items-center gap-2 py-1.5 border-b border-amber-100 last:border-0 text-sm">
                                            <span className="font-semibold text-gray-800">{w.lithuanian}</span>
                                            <span className="text-gray-300">—</span>
                                            <span className="text-gray-600">{w.english}</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex gap-2 justify-center flex-wrap">
                                    <button onClick={startReviewRound}
                                        className="px-5 py-3 bg-amber-500 hover:bg-amber-600 text-white rounded-xl font-medium text-sm transition-colors shadow-sm">
                                        ⟳ Pakartoti šiuos žodžius
                                    </button>
                                    <button onClick={() => setMode('completed')}
                                        className="px-5 py-3 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl font-medium text-sm transition-colors">
                                        Baigti →
                                    </button>
                                </div>
                            </div>
                        </div>
                    </PageWrapper>
                );
            };

            // ==================== COMPLETION ====================
            const CompletionScreen = () => {
                const percentage = score.total > 0 ? Math.round((score.correct / score.total) * 100) : 0;
                let message, emoji;
                if (percentage === 100) { message = 'Puiku! Tobulas rezultatas!'; emoji = '🎉'; }
                else if (percentage >= 80) { message = 'Labai gerai!'; emoji = '😊'; }
                else if (percentage >= 60) { message = 'Gerai, bet galima geriau!'; emoji = '👍'; }
                else { message = 'Reikia daugiau praktikos!'; emoji = '💪'; }

                return (
                    <PageWrapper>
                        <div className="fade-in mt-8">
                            <div className="bg-white rounded-2xl shadow-sm p-8 text-center">
                                <div className="text-6xl mb-4">{emoji}</div>
                                <h2 className="text-2xl font-bold text-gray-800 mb-1">Baigta!</h2>
                                <p className="text-lg text-gray-500 mb-5">{message}</p>
                                <div className="bg-gray-50 rounded-xl p-5 mb-5">
                                    <div className="text-4xl font-bold mb-1" style={{color:'#4a6fa5'}}>{percentage}%</div>
                                    <div className="text-sm text-gray-500 mb-3">{score.correct} iš {score.total} teisingų atsakymų</div>
                                    <div className="w-full bg-gray-200 rounded-full h-2.5">
                                        <div className="h-2.5 rounded-full transition-all duration-500" style={{width: `${percentage}%`, background:'#4a6fa5'}}></div>
                                    </div>
                                    {isReviewRound && <div className="mt-2 text-xs text-amber-600 font-medium">⟳ Po kartojimo</div>}
                                </div>
                                <div className="flex gap-2 justify-center flex-wrap">
                                    <button onClick={resetToMenu}
                                        className="px-5 py-3 text-white rounded-xl font-medium text-sm transition-colors shadow-sm" style={{background:'#4a6fa5'}}>
                                        Grįžti į meniu
                                    </button>
                                    <button onClick={() => {
                                        setCurrentIndex(0); setScore({ correct: 0, total: 0 }); setFeedback(''); setSelectedOption(null); setUserAnswer('');
                                        setIncorrectWords([]); setReviewIncorrectWords([]); setIsReviewRound(false); setMode(lastMode);
                                    }}
                                        className="px-5 py-3 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl font-medium text-sm transition-colors">
                                        Bandyti dar kartą
                                    </button>
                                </div>
                            </div>
                        </div>
                    </PageWrapper>
                );
            };

            return (
                <>
                    {mode === 'menu' && <MenuScreen />}
                    {mode === 'flashcards' && <FlashcardsMode />}
                    {mode === 'multipleChoice' && <MultipleChoiceMode />}
                    {mode === 'typing' && <TypingMode />}
                    {mode === 'sentenceCompletion' && <SentenceCompletionMode />}
                    {mode === 'reviewOffer' && <ReviewOfferScreen />}
                    {mode === 'completed' && <CompletionScreen />}
                </>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
    <script>
        // Register PWA service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
